<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/public/favicon.png" />
  <link rel="apple-touch-icon" href="/public/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Extras | Your Name</title>
  <meta name="description" content="Shortlinks, compilations, and other stuff." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
  <script>
    (function () {
      const theme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>

<body>
  <nav class="navbar">
    <div class="container navbar-content">
      <a href="/" class="logo">xx<span>.</span></a>

      <div class="nav-links">
        <a href="/about" class="nav-link">about</a>
        <a href="/projects" class="nav-link">projects</a>
        <a href="/community" class="nav-link">community</a>
        <a href="/blog" class="nav-link">blog</a>
        <a href="/extras" class="nav-link active">extras</a>
        <a href="/contact" class="nav-link">contact</a>
      </div>

      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>

      <button class="menu-toggle text-primary" id="menu-toggle" onclick="toggleMobileMenu()">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </button>
    </div>

    <div id="mobile-nav" class="mobile-nav">
      <a href="/about" class="mobile-nav-link">about</a>
      <a href="/projects" class="mobile-nav-link">projects</a>
      <a href="/community" class="mobile-nav-link">community</a>
      <a href="/blog" class="mobile-nav-link">blog</a>
      <a href="/extras" class="mobile-nav-link">extras</a>
      <a href="/contact" class="mobile-nav-link">contact</a>
    </div>
  </nav>

  <main class="page-content container">
    <div class="bash-cmd">$ ls ~/extras/</div>

    <div style="margin-top: 1.5rem;">

      <!-- Shortlinks: add one row per redirect in vercel.json -->
      <div style="margin-bottom: 2.5rem;">
        <div class="bash-cmd" style="margin-bottom: 0.75rem;">$ cat ~/links.txt</div>
        <div class="links-list" style="margin-top: 0;">
          <a href="/your-slug" class="links-row">
            <span class="links-slug">/your-slug</span>
            <span class="links-desc">[brief description]</span>
          </a>
        </div>
      </div>

      <!-- Compilations: research or archive projects you built -->
      <div style="margin-bottom: 2.5rem; padding-top: 2rem; border-top: 1px solid var(--border-color);">
        <div class="bash-cmd" style="margin-bottom: 0.75rem;">$ ls ~/compilations/</div>
        <div style="display: flex; flex-direction: column; gap: 0.6rem;">
          <a href="/your-compilation" target="_blank" class="text-primary mono" style="font-size: 0.9rem; text-decoration: none; opacity: 0.85;">~/your-compilation <span class="text-secondary" style="font-weight: 400;">&mdash; short description</span></a>
        </div>
      </div>

      <!-- Pages: standalone pages you made -->
      <div style="padding-top: 2rem; border-top: 1px solid var(--border-color);">
        <div class="bash-cmd" style="margin-bottom: 0.75rem;">$ ls ~/pages/</div>
        <div style="display: flex; flex-direction: column; gap: 0.6rem;">
          <a href="/your-page" target="_blank" class="text-primary mono" style="font-size: 0.9rem; text-decoration: none; opacity: 0.85;">~/your-page <span class="text-secondary" style="font-weight: 400;">&mdash; short description</span></a>
        </div>
      </div>

    </div>
  </main>

  <footer>
    <div class="container">
      <div>&copy; Your Name</div>
    </div>
  </footer>

  <script src="main.js"></script>
</body>

</html>
